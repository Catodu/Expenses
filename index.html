<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<meta name="description" content="Saisie de dépenses ultra-rapide">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Dépenses</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #1a1d24;
    --border: #2a2e38;
    --text: #e8eaed;
    --muted: #8a919e;
    --accent: #4ade80;
    --error: #f87171;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: max(16px, env(safe-area-inset-top)) 16px 16px;
  }
  main { width: 100%; max-width: 480px; }
  h1 {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  form { display: flex; gap: 8px; }
  form[hidden] { display: none; } /* sinon display:flex écrase l'attribut hidden */
  #txt {
    flex: 1;
    font-size: 22px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    outline: none;
    min-width: 0;
  }
  #txt:focus { border-color: var(--accent); }
  #txt::placeholder { color: var(--muted); opacity: 0.6; }
  button {
    font-size: 22px;
    padding: 0 20px;
    background: var(--accent);
    color: #08240f;
    border: none;
    border-radius: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  button:active { opacity: 0.8; }

  #pending {
    margin-top: 10px;
    font-size: 13px;
    color: var(--warn);
  }
  #pending[hidden] { display: none; }

  /* Tuiles de stats */
  #stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .tileLabel {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .tileValue {
    font-size: 24px;
    font-weight: 700;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .tileSub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    min-height: 15px;
  }
  /* Récap affiché depuis le cache local, pas encore confirmé par le réseau */
  main.stale .tileValue, main.stale #catBars, main.stale #history {
    opacity: 0.55;
    transition: opacity 0.2s;
  }

  /* Barres par catégorie (mois) */
  #catBars {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .catRow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .catRow .name {
    width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .catRow .bar {
    flex: 1;
    height: 9px;
    background: var(--surface);
    border-radius: 5px;
    overflow: hidden;
  }
  .catRow .bar i {
    display: block;
    height: 100%;
    border-radius: 5px;
    opacity: 0.9;
  }
  .catRow .amt {
    width: 76px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* Liste du jour + saisies en cours */
  #listTitle {
    margin-top: 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #listTitle[hidden] { display: none; }
  #history { margin-top: 4px; list-style: none; }
  #history li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 2px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  #history li .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #history li .label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #history li .label small { color: var(--muted); font-size: 13px; }
  #history li .amt {
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  #history li.pending, #history li.queued, #history li.error { color: var(--muted); }
  #history li.queued .amt { color: var(--warn); }
  #history li.error .amt { color: var(--error); }

  #noToken {
    margin-top: 16px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.5;
    color: var(--warn);
  }
  #noToken code { color: var(--text); }

  /* Toast en overlay : ne réserve aucun espace dans la page */
  #toast {
    position: fixed;
    left: 16px;
    right: 16px;
    bottom: max(20px, env(safe-area-inset-bottom));
    max-width: 448px;
    margin: 0 auto;
    padding: 13px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok { color: var(--accent); }
  #toast.err { color: var(--error); }
  #toast.warn { color: var(--warn); }
</style>
</head>
<body>
<main>
  <h1>Dépenses</h1>
  <form id="f" autocomplete="off">
    <input id="txt" type="text" placeholder="40 picard" autofocus
           aria-label="Saisie de dépense (montant puis libellé)"
           autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="send">
    <button type="submit" aria-label="Envoyer">➤</button>
  </form>
  <div id="pending" role="status" hidden></div>
  <section id="stats">
    <div class="tile">
      <div class="tileLabel">Aujourd’hui</div>
      <div class="tileValue" id="statDay">—</div>
      <div class="tileSub" id="statDaySub"></div>
    </div>
    <div class="tile">
      <div class="tileLabel">Ce mois</div>
      <div class="tileValue" id="statMonth">—</div>
      <div class="tileSub" id="statMonthSub"></div>
    </div>
  </section>
  <div id="catBars"></div>
  <div id="listTitle" hidden>Aujourd’hui</div>
  <ul id="history"></ul>
  <div id="noToken" hidden>
    Token manquant ou invalide.<br>
    Rouvre l’app via ton lien d’installation (celui qui se termine par
    <code>#token=…</code>) — il réenregistre le token sur cet appareil.
  </div>
  <div id="toast" role="status"></div>
</main>

<script>
/* ================== CONFIG (voir SETUP.md) ================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbyQpXQQEc8Jt553I5TMxilA2U6xxgOHNko0bcmzio6rwCS7EVgp7kVzi0aGIM67Dv93/exec';
/* Le token n'est PAS dans le code : fourni une fois via le lien
   d'installation ...#token=XXX, puis conservé en localStorage. */
const TKEY = 'expense_token_v1';
let TOKEN = localStorage.getItem(TKEY);

function captureTokenFromHash() {
  const m = location.hash.match(/^#token=([A-Za-z0-9_-]+)$/);
  if (!m) return false;
  localStorage.setItem(TKEY, m[1]);
  TOKEN = m[1];
  // Nettoie la barre d'adresse ; jamais bloquant si l'API manque.
  try {
    history.replaceState(null, '', location.pathname + location.search);
  } catch {
    try { location.hash = ''; } catch { /* tant pis, le token est stocké */ }
  }
  return true;
}
captureTokenFromHash();
/* ============================================================ */

const QKEY = 'expense_queue_v1';
const txt = document.getElementById('txt');
const form = document.getElementById('f');
const toastEl = document.getElementById('toast');
const pendingEl = document.getElementById('pending');
const historyEl = document.getElementById('history');
const listTitleEl = document.getElementById('listTitle');
const statDayEl = document.getElementById('statDay');
const statDaySubEl = document.getElementById('statDaySub');
const statMonthEl = document.getElementById('statMonth');
const statMonthSubEl = document.getElementById('statMonthSub');
const catBarsEl = document.getElementById('catBars');
const noTokenEl = document.getElementById('noToken');
const mainEl = document.querySelector('main');

/* "session" et pas "history" : nommer ce tableau `history` masquerait
   window.history et casserait history.replaceState() dans captureTokenFromHash. */
const session = []; // saisies de la session (les non-confirmées restent affichées)
let dayRecap = null; // dernier récap du jour renvoyé par le backend
let toastTimer = null;
let flushing = false;
let recapSeq = 0; // ignore les réponses de récap arrivées dans le désordre
let recapAt = 0; // horodatage du récap affiché
let recapFresh = false; // false = récap issu du cache local, pas encore confirmé

/* Dernier récap conservé en localStorage : affiché immédiatement au chargement
   (estompé + "il y a X") en attendant la réponse réseau — l'app ne paraît
   jamais vide. Le Sheet reste la source de vérité (D15) : c'est un affichage
   d'attente, remplacé dès que fetchRecap répond. */
const RKEY = 'expense_recap_v1';

const eur = new Intl.NumberFormat('fr-BE', { style: 'currency', currency: 'EUR' });

// Date du jour en Europe/Brussels (fr-CA → format yyyy-mm-dd)
function todayStr() {
  return new Intl.DateTimeFormat('fr-CA', {
    timeZone: 'Europe/Brussels', year: 'numeric', month: '2-digit', day: '2-digit'
  }).format(new Date());
}

/* Couleurs par catégorie : palette fixe validée pour fond sombre (cf. D27) —
   le hash HSL produisait des teintes trop proches entre catégories.
   `autre` en gris neutre (catch-all). Catégorie inconnue → slot par hash
   dans la même palette (stable entre sessions et appareils). */
const CAT_COLORS = {
  nourriture: '#008300',
  restaurant: '#d95926',
  sorties: '#d55181',
  transport: '#3987e5',
  shopping: '#9085e9',
  sante: '#e66767',
  abonnements: '#199e70',
  logement: '#c98500',
  sport: '#1f9fc9',
  cadeaux: '#8a9a00',
  chat: '#b56d33',
  autre: '#898781'
};
const CAT_FALLBACK = Object.values(CAT_COLORS).filter((c) => c !== '#898781');
function catColor(name) {
  // Même normalisation que le backend (D3) : minuscules + sans diacritiques.
  const key = String(name).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  if (CAT_COLORS[key]) return CAT_COLORS[key];
  let h = 0;
  for (const ch of key) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return CAT_FALLBACK[h % CAT_FALLBACK.length];
}

function toast(msg, kind) {
  toastEl.textContent = msg;
  toastEl.className = 'show ' + kind;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.className = ''; }, 4000);
}

function getQueue() {
  try { return JSON.parse(localStorage.getItem(QKEY)) || []; }
  catch { return []; }
}
function setQueue(q) {
  localStorage.setItem(QKEY, JSON.stringify(q));
  pendingEl.hidden = q.length === 0;
  pendingEl.textContent = q.length ? `⏳ ${q.length} en attente de synchronisation` : '';
}

function showNoToken() {
  noTokenEl.hidden = false;
  form.hidden = true;
}

function agoLabel(ts) {
  const m = Math.round((Date.now() - ts) / 60000);
  if (m < 1) return 'à l’instant';
  if (m < 60) return `il y a ${m} min`;
  const h = Math.round(m / 60);
  if (h < 24) return `il y a ${h} h`;
  return `il y a ${Math.round(h / 24)} j`;
}

function loadCachedRecap() {
  let c;
  try { c = JSON.parse(localStorage.getItem(RKEY)); } catch { return; }
  if (!c || !c.recap || !c.day) return;
  const today = todayStr();
  if (c.day !== today && c.day.slice(0, 7) !== today.slice(0, 7)) return; // autre mois : inutile
  // Autre jour du même mois : le jour repart de zéro, seul le mois reste indicatif.
  dayRecap = c.day === today ? c.recap : { ...c.recap, total: 0, count: 0, items: [] };
  recapAt = c.at || 0;
  recapFresh = false;
  renderHistory();
}

/* Rendu : tuiles de stats, barres par catégorie, puis liste = saisies de
   session non confirmées (pending/queued/error) + dépenses du jour. */
function renderHistory() {
  historyEl.innerHTML = '';
  mainEl.classList.toggle('stale', Boolean(dayRecap) && !recapFresh);

  const unconfirmed = session.filter((h) => h.status !== 'ok').slice(-5).reverse();
  for (const h of unconfirmed) {
    const li = document.createElement('li');
    li.className = h.status;
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = 'var(--border)';
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = h.text;
    const amt = document.createElement('span');
    amt.className = 'amt';
    amt.textContent = h.info;
    li.append(dot, label, amt);
    historyEl.appendChild(li);
  }

  if (dayRecap) {
    statDayEl.textContent = eur.format(dayRecap.total);
    const ago = (recapFresh || !recapAt) ? '' : ` · ${agoLabel(recapAt)}`;
    statDaySubEl.textContent =
      `${dayRecap.count} dépense${dayRecap.count > 1 ? 's' : ''}${ago}`;
    statMonthEl.textContent = eur.format(dayRecap.month_total);
    const nCats = (dayRecap.by_category || []).length;
    statMonthSubEl.textContent =
      nCats ? `${nCats} catégorie${nCats > 1 ? 's' : ''}` : '';

    catBarsEl.innerHTML = '';
    const cats = dayRecap.by_category || [];
    const maxCat = cats.length ? cats[0].total : 0;
    for (const c of cats) {
      const row = document.createElement('div');
      row.className = 'catRow';
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = c.categorie;
      const bar = document.createElement('span');
      bar.className = 'bar';
      const fill = document.createElement('i');
      fill.style.width = maxCat ? `${Math.max(2, (c.total / maxCat) * 100)}%` : '0%';
      fill.style.background = catColor(c.categorie);
      bar.appendChild(fill);
      const amt = document.createElement('span');
      amt.className = 'amt';
      amt.textContent = eur.format(c.total);
      row.append(name, bar, amt);
      catBarsEl.appendChild(row);
    }

    const items = dayRecap.items.slice().reverse();
    listTitleEl.hidden = items.length === 0 && unconfirmed.length === 0;
    for (const it of items) {
      const li = document.createElement('li');
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = catColor(it.categorie);
      const label = document.createElement('span');
      label.className = 'label';
      const small = document.createElement('small');
      small.textContent = ` · ${it.categorie}`;
      label.append(it.libelle, small);
      const amt = document.createElement('span');
      amt.className = 'amt';
      amt.textContent = eur.format(it.montant);
      li.append(dot, label, amt);
      historyEl.appendChild(li);
    }
  } else {
    listTitleEl.hidden = unconfirmed.length === 0;
  }
}

async function fetchRecap() {
  if (!TOKEN || !navigator.onLine) return;
  const seq = ++recapSeq; // deux fetch peuvent se résoudre dans le désordre
  // "…" = chargement en cours ; "—" reste réservé à "pas de données".
  if (!dayRecap) { statDayEl.textContent = '…'; statMonthEl.textContent = '…'; }
  try {
    const res = await fetch(`${API_URL}?token=${encodeURIComponent(TOKEN)}&action=today`);
    const data = await res.json();
    if (seq !== recapSeq) return;
    if (data.ok) {
      dayRecap = data;
      recapFresh = true;
      recapAt = Date.now();
      try {
        localStorage.setItem(RKEY, JSON.stringify({ day: todayStr(), at: recapAt, recap: data }));
      } catch { /* stockage plein : tant pis pour le cache */ }
      renderHistory();
    } else if (!dayRecap) {
      statDayEl.textContent = '—';
      statMonthEl.textContent = '—';
    }
  } catch {
    // Hors-ligne ou backend indisponible : on garde l'affichage courant.
    if (!dayRecap && seq === recapSeq) {
      statDayEl.textContent = '—';
      statMonthEl.textContent = '—';
    }
  }
}

// POST "simple request" (pas de header custom → pas de preflight CORS,
// Apps Script renvoie Access-Control-Allow-Origin: * → réponse lisible)
async function apiSend(item) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ token: TOKEN, text: item.text, client_date: item.date })
  });
  return res.json();
}

async function submitEntry(text) {
  const item = { text, date: todayStr() };
  const entry = { text, status: 'pending', info: '…' };
  session.push(entry);
  renderHistory();

  if (!navigator.onLine) {
    queueItem(item, entry);
    return;
  }
  try {
    const data = await apiSend(item);
    if (data.ok) {
      entry.status = 'ok';
      entry.info = `✓ ${eur.format(data.amount)} → ${data.category}`;
      const note = data.repeated ? ' · montant repris' : '';
      toast(`✓ ${eur.format(data.amount)} → ${data.category}${note}`, 'ok');
      fetchRecap();
    } else if (data.error === 'unauthorized') {
      entry.status = 'error';
      entry.info = '✗ token';
      txt.value = text; // rien n'a été loggé : on garde la saisie
      showNoToken();
    } else {
      entry.status = 'error';
      entry.info = '✗';
      toast('✗ ' + (data.error || 'Erreur inconnue'), 'err');
      txt.value = text;
    }
  } catch {
    // Réseau KO ou réponse illisible : on met en file plutôt que de perdre.
    queueItem(item, entry);
  }
  renderHistory();
}

function queueItem(item, entry) {
  const q = getQueue();
  q.push(item);
  setQueue(q);
  entry.status = 'queued';
  entry.info = '⏳ hors-ligne';
  toast('⏳ Hors-ligne — mis en file, sera synchronisé.', 'warn');
  renderHistory();
}

async function flushQueue() {
  if (flushing || !navigator.onLine) return;
  if (!getQueue().length) return;
  flushing = true;
  let synced = 0;
  try {
    while (true) {
      // Relit la file à chaque tour : une saisie peut s'y ajouter pendant
      // l'await — travailler sur un snapshot l'écraserait au setQueue suivant.
      const q = getQueue();
      if (!q.length) break;
      const data = await apiSend(q[0]); // rejette si réseau KO → on garde l'item
      if (data.ok || (data.error && data.error !== 'unauthorized')) {
        // ok, ou erreur de parsing définitive : on retire de la file
        q.shift();
        setQueue(q);
        if (data.ok) {
          synced++;
          toast(`✓ Synchronisé : ${eur.format(data.amount)} → ${data.category}`, 'ok');
        }
      } else {
        break; // unauthorized : inutile d'insister
      }
    }
  } catch { /* réseau : on réessaiera plus tard */ }
  flushing = false;
  if (synced > 0) fetchRecap();
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = txt.value.trim();
  if (!text) return;
  txt.value = '';
  txt.focus();
  if (/^(annule|undo)$/i.test(text)) {
    undoLast();
    return;
  }
  submitEntry(text);
});

/* "annule" : retire d'abord la dernière saisie encore en file locale
   (pas encore envoyée), sinon demande au backend de supprimer la
   dernière ligne du Sheet. */
async function undoLast() {
  const q = getQueue();
  if (q.length) {
    const it = q.pop();
    setQueue(q);
    for (let i = session.length - 1; i >= 0; i--) {
      if (session[i].status === 'queued' && session[i].text === it.text) {
        session.splice(i, 1);
        break;
      }
    }
    renderHistory();
    toast(`↩ Retiré de la file : ${it.text}`, 'warn');
    return;
  }
  if (!navigator.onLine) {
    toast('✗ Hors-ligne — rien à annuler dans la file.', 'err');
    return;
  }
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ token: TOKEN, action: 'undo' })
    });
    const data = await res.json();
    if (data.ok) {
      toast(`↩ Annulé : ${eur.format(data.undone.montant)} ${data.undone.libelle}`, 'ok');
      fetchRecap();
    } else if (data.error === 'unauthorized') {
      showNoToken();
    } else {
      toast('✗ ' + (data.error || 'Erreur inconnue'), 'err');
    }
  } catch {
    toast('✗ Réseau indisponible — réessaie pour annuler.', 'err');
  }
}

window.addEventListener('hashchange', () => {
  if (captureTokenFromHash()) {
    noTokenEl.hidden = true;
    form.hidden = false;
    toast('✓ Token enregistré.', 'ok');
    flushQueue();
    fetchRecap();
    txt.focus();
  }
});

window.addEventListener('online', flushQueue);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { txt.focus(); flushQueue(); fetchRecap(); }
});

setQueue(getQueue()); // affiche le compteur au chargement
if (!TOKEN) {
  showNoToken();
} else {
  loadCachedRecap(); // affichage immédiat, remplacé dès que le réseau répond
  flushQueue();
  fetchRecap();
  txt.focus();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
